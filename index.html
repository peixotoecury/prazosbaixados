<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LAWgico Protocolados — Peixoto & Cury</title>
<script>
// Auth guard — mesma chave usada por login.html/protocolados.html
(function(){
  var storage = localStorage.getItem('lawgico_baixados_remember') === '1' ? localStorage : sessionStorage;
  var auth = storage.getItem('lawgico_baixados_auth') === '1';
  if (!auth) { window.location.replace('login.html'); }
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pc-azul:#00A9E0;
  --pc-escuro:#003B5C;
  --bg:#051520;--bg2:#0a2235;
  --tx:#e8edf3;--tx2:#7a9bb5;
  --cyan:#00A9E0;
}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:Arial,sans-serif;font-size:13px;display:flex;flex-direction:column}
.hdr{background:linear-gradient(90deg,var(--pc-escuro) 0%,#005080 70%,var(--pc-azul) 100%);border-bottom:3px solid var(--pc-azul);display:flex;align-items:center;gap:16px;padding:12px 20px;flex:0 0 auto}
.lw-mark{display:flex;flex-direction:column;flex-shrink:0;line-height:1}
.lw-wordmark{display:inline-block;position:relative;line-height:1}
.lw-law{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px;font-family:'Sora',sans-serif}
.lw-gico{font-size:18px;font-weight:300;color:#fff;letter-spacing:-.5px;font-family:'Sora',sans-serif}
.lw-mod{font-size:9px;font-weight:300;color:rgba(255,255,255,.7);letter-spacing:.4px;font-family:'Sora',sans-serif;position:absolute;top:-5px;right:0}
.lw-tag{font-size:7.5px;color:rgba(255,255,255,.6);letter-spacing:3px;font-weight:300;margin-top:1px;font-family:'Sora',sans-serif}
.hdr-title{font-size:14px;font-weight:700;color:#fff;font-family:'Sora',sans-serif}
.hdr-sub{font-size:10.5px;color:rgba(255,255,255,.65);margin-top:2px}
.tabbar{background:var(--bg2);border-bottom:1px solid rgba(0,169,224,.2);display:flex;gap:2px;padding:0 20px;flex:0 0 auto;overflow-x:auto}
.tab-btn{background:none;border:none;color:var(--tx2);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;padding:12px 18px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--tx)}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tabframe-wrap{flex:1 1 auto;min-height:0}
#tabframe{width:100%;height:100%;border:none;display:block;background:#fff}
</style>
</head>
<body>

<div class="hdr">
  <div class="lw-mark">
    <div class="lw-wordmark"><span class="lw-law">LAW</span><span class="lw-gico">gico</span><span class="lw-mod">protocolados</span></div>
    <div class="lw-tag">lawyers at work</div>
  </div>
  <div>
    <div class="hdr-title">⚖ Protocolados — Gestão de Prazos Realizados</div>
    <div class="hdr-sub">Controladoria Jurídica · Área Trabalhista</div>
  </div>
</div>

<div class="tabbar" id="tabbar"></div>

<div class="tabframe-wrap">
  <iframe id="tabframe" title="Conteúdo"></iframe>
</div>

<script>
// Para adicionar um novo relatório mensal: só incluir mais um item aqui.
const TABS = [
  { id: 'protocolados',    label: '📂 Protocolados',    src: 'protocolados.html' },
  { id: 'justificativas',  label: '📝 Justificativas de Fatais',  src: 'Justificativas_Fatais_Dashboard.html' },
  { id: 'protocolados-mes',label: '📅 Protocolados por Mês', src: 'Protocolados_Mes.html' },
  { id: 'evolucao-prazos', label: '📈 Evolução dos Prazos', src: 'Evolucao_Prazos.html' },
  { id: 'analises',        label: '🔍 Análises',           src: 'Analises.html' },
];

function renderTabs(){
  const bar = document.getElementById('tabbar');
  bar.innerHTML = TABS.map((t, i) =>
    `<button class="tab-btn${i === 0 ? ' active' : ''}" data-id="${t.id}" onclick="selectTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function selectTab(id){
  const tab = TABS.find(t => t.id === id);
  if (!tab) return;
  document.getElementById('tabframe').src = tab.src;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
}

renderTabs();
selectTab(TABS[0].id);
</script>
</body>
</html>
